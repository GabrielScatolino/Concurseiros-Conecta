<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <link rel="stylesheet" href="styles.css" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Concurseiros Conecta - Recuperar Senha</title>
</head>

<body>
  <section id="tela_senha">
    <div>
      <div>
        <div>
          <p>Alterar senha</p>
          <p>Informe seus dados cadastrados</p>
        </div>
      </div>
      <div>
        <label>E-mail</label>
        <input type="email" placeholder="seu@email.com" autocomplete="email" />
      </div>
      <div>
        <label>CPF</label>
        <input type="text" placeholder="000.000.000-00" maxlength="14" oninput="maskCPF(this)" inputmode="numeric" />
      </div>
      <a href="confirmacao.html"><button>Enviar</button></a>
    </div>
  </section>
</body>

</html>
