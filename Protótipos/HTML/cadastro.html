<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <link rel="stylesheet" href="styles.css" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Concurseiros Conecta - Cadastro</title>
</head>

<body>
  <section id="tela_cadastro">
    <div>
      <div>
        <a href="index.html"><button>&#8592;</button></a>
        <div>
          <p>Criar conta</p>
          <p>Preencha os dados abaixo</p>
        </div>
      </div>
      <div>
        <label>E-mail</label>
        <input type="email" placeholder="seu@email.com" autocomplete="email" />
      </div>
      <div>
        <label>CPF</label>
        <input type="text" placeholder="000.000.000-00" maxlength="14" oninput="maskCPF(this)" inputmode="numeric" />
      </div>
      <div>
        <label>Senha</label>
        <input type="password" placeholder="Mínimo 8 caracteres" autocomplete="new-password" />
      </div>
      <div>
        <label>Confirmar senha</label>
        <input type="password" placeholder="Repita a senha" autocomplete="new-password" />
      </div>
      <a href="login.html"><button>Criar conta</button></a>
    </div>
  </section>
</body>

</html>
